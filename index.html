<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>3D Survival - Balanced</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 6px; height: 6px;
            background: rgba(0,255,0,0.8); border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 100;
        }
        #ui {
            position: absolute; bottom: 20px; left: 20px; color: #0f0;
            font-size: 16px; text-shadow: 2px 2px #000; z-index: 100;
        }
        #overlay {
            position: absolute; width: 100%; height: 100%; background: #000;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; color: #0f0; z-index: 200; cursor: pointer;
        }
        #music-video { display: none !important; }
    </style>
</head>
<body>

    <div id="crosshair"></div>
    <div id="ui">SYSTEM: ONLINE | DYSTANS: <span id="dist">0</span>m</div>
    
    <div id="overlay">
        <h1 style="letter-spacing: 10px;">ZALADOWANO</h1>
        <p>[ KLIKNIJ, ABY ROZPOCZAC ]</p>
    </div>

    <video id="music-video" loop><source src="video1.mp4" type="video/mp4"></video>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        let scene, camera, renderer, controls, enemy, clock;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        // --- USTAWIENIA PRĘDKOŚCI ---
        const WALK_SPEED = 40.0;  // Zmniejszono ze 150
        const ENEMY_SPEED = 1.8; // Zmniejszono z 4
        const PLAYER_HEIGHT = 0.8; // Niższa kamera, by nie czuć się gigantem

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020202);
            scene.fog = new THREE.Fog(0x020202, 1, 40);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.05, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            controls = new PointerLockControls(camera, document.body);
            document.getElementById('overlay').addEventListener('click', () => controls.lock());

            controls.addEventListener('lock', () => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('music-video').play();
            });

            // OŚWIETLENIE
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const pointLight = new THREE.PointLight(0xffffff, 50, 20);
            camera.add(pointLight);
            scene.add(camera);

            // MAPA
            const loader = new GLTFLoader();
            loader.load('map.glb', (gltf) => {
                const model = gltf.scene;
                
                // Automatyczne ustawienie na środku i na ziemi
                const box = new THREE.Box3().setFromObject(model);
                model.position.y = -box.min.y; 
                scene.add(model);
            });

            // PRZECIWNIK (photo1.png)
            const texLoader = new THREE.TextureLoader();
            texLoader.load('photo1.png', (texture) => {
                const material = new THREE.MeshBasicMaterial({ map: texture, transparent: true, side: THREE.DoubleSide });
                enemy = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 1.5), material);
                enemy.position.set(5, 0.75, -5); // Startuje bliżej, ale wolniej
                scene.add(enemy);
            });

            clock = new THREE.Clock();
            
            const onKey = (e, state) => {
                if (e.code === 'KeyW') moveForward = state;
                if (e.code === 'KeyS') moveBackward = state;
                if (e.code === 'KeyA') moveLeft = state;
                if (e.code === 'KeyD') moveRight = state;
            };
            window.addEventListener('keydown', (e) => onKey(e, true));
            window.addEventListener('keyup', (e) => onKey(e, false));
            
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked) {
                const delta = clock.getDelta();

                // Fizyka gracza
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (moveForward || moveBackward) velocity.z -= direction.z * WALK_SPEED * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * WALK_SPEED * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);

                camera.position.y = PLAYER_HEIGHT;

                // AI Przeciwnika
                if (enemy) {
                    enemy.lookAt(camera.position);
                    const enemyDir = new THREE.Vector3().subVectors(camera.position, enemy.position).normalize();
                    enemyDir.y = 0; // Przeciwnik trzyma się ziemi
                    enemy.position.add(enemyDir.multiplyScalar(ENEMY_SPEED * delta));

                    const dist = camera.position.distanceTo(enemy.position);
                    document.getElementById('dist').innerText = Math.floor(dist);

                    if (dist < 0.8) {
                        controls.unlock();
                        alert("ZŁAPANY!");
                        location.reload();
                    }
                }
            }
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
