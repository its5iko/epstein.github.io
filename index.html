<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>3D Survival Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 6px; height: 6px;
            background: rgba(0,255,0,0.8); border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 100;
        }
        #ui {
            position: absolute; bottom: 20px; left: 20px; color: #0f0;
            font-size: 16px; text-shadow: 2px 2px #000; z-index: 100;
        }
        #overlay {
            position: absolute; width: 100%; height: 100%; background: #000;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; color: #0f0; z-index: 200; cursor: pointer;
        }
        #music-video { display: none !important; }
    </style>
</head>
<body>

    <div id="crosshair"></div>
    <div id="ui">SYSTEM: ONLINE | DISTANCE: <span id="dist">0</span>m</div>
    
    <div id="overlay">
        <h1>MAPA SKALOWANA...</h1>
        <p>[ KLIKNIJ, ABY WEJŚĆ ]</p>
    </div>

    <video id="music-video" loop><source src="video1.mp4" type="video/mp4"></video>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        let scene, camera, renderer, controls, enemy, clock;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            scene.fog = new THREE.Fog(0x050505, 1, 50);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            controls = new PointerLockControls(camera, document.body);
            document.getElementById('overlay').addEventListener('click', () => {
                controls.lock();
            });

            controls.addEventListener('lock', () => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('music-video').play();
            });

            // ŚWIATŁO - Zwiększone, żeby widzieć mapę
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            
            const flashlight = new THREE.PointLight(0xffffff, 200, 50);
            camera.add(flashlight);
            scene.add(camera);

            // ŁADOWANIE MAPY Z POPRAWKĄ SKALOWANIA
            const loader = new GLTFLoader();
            loader.load('map.glb', (gltf) => {
                const model = gltf.scene;
                
                // Automatyczne skalowanie (jeśli mapa jest ogromna, zmniejszamy ją)
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                const scale = 50 / maxDim; // Skalujemy tak, by mapa miała rozsądny rozmiar
                model.scale.set(scale, scale, scale);
                
                // Centrowanie mapy pod nogami
                model.position.y = 0;
                scene.add(model);
                console.log("Mapa wczytana i przeskalowana");
            });

            // PRZECIWNIK
            const texLoader = new THREE.TextureLoader();
            texLoader.load('photo1.png', (texture) => {
                const material = new THREE.MeshBasicMaterial({ map: texture, transparent: true });
                enemy = new THREE.Mesh(new THREE.PlaneGeometry(3, 3), material);
                enemy.position.set(10, 1.5, -10);
                scene.add(enemy);
            });

            clock = new THREE.Clock();
            
            const onKey = (e, state) => {
                if (e.code === 'KeyW') moveForward = state;
                if (e.code === 'KeyS') moveBackward = state;
                if (e.code === 'KeyA') moveLeft = state;
                if (e.code === 'KeyD') moveRight = state;
            };
            window.addEventListener('keydown', (e) => onKey(e, true));
            window.addEventListener('keyup', (e) => onKey(e, false));
            
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked) {
                const delta = clock.getDelta();
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (moveForward || moveBackward) velocity.z -= direction.z * 150.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 150.0 * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);

                // Gracz nie może spaść ani latać (stała wysokość)
                camera.position.y = 1.6;

                if (enemy) {
                    enemy.lookAt(camera.position);
                    const enemyDir = new THREE.Vector3().subVectors(camera.position, enemy.position).normalize();
                    enemy.position.add(enemyDir.multiplyScalar(4 * delta));
                    const dist = camera.position.distanceTo(enemy.position);
                    document.getElementById('dist').innerText = Math.floor(dist);
                    if (dist < 1.8) {
                        controls.unlock();
                        alert("KONIEC GRY");
                        location.reload();
                    }
                }
            }
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
