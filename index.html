<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>3D Survival - Position Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 4px; height: 4px;
            background: rgba(255, 0, 0, 0.5); border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 100;
        }
        #ui {
            position: absolute; bottom: 20px; left: 20px; color: #400;
            font-size: 12px; z-index: 100;
        }
        #overlay {
            position: absolute; width: 100%; height: 100%; background: #000;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; color: #800; z-index: 200; cursor: pointer;
        }
        #music-video { display: none !important; }
    </style>
</head>
<body>

    <div id="crosshair"></div>
    <div id="ui">X-POS: <span id="pos-info">0</span> | DIST: <span id="dist">0</span>m</div>
    
    <div id="overlay">
        <h1>RE-POZYCJONOWANIE...</h1>
        <p>[ KLIKNIJ, ABY WEJŚĆ ]</p>
    </div>

    <video id="music-video" loop><source src="video1.mp4" type="video/mp4"></video>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        let scene, camera, renderer, controls, enemy, clock, mapModel;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        const raycaster = new THREE.Raycaster();

        // --- PARAMETRY ---
        const WALK_SPEED = 10.0;     
        const ENEMY_SPEED = 0.25;    
        const PLAYER_HEIGHT = 0.12; // Twoja wysokość nad podłogą
        const COLLISION_DIST = 0.2;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);
            scene.fog = new THREE.Fog(0x000000, 0.1, 6);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.001, 100);
            
            // STARTUJEMY NIECO DALEJ OD ŚRODKA (0,0,0)
            camera.position.set(2, PLAYER_HEIGHT, 2);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            controls = new PointerLockControls(camera, document.body);
            document.getElementById('overlay').addEventListener('click', () => controls.lock());

            controls.addEventListener('lock', () => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('music-video').play();
            });

            // Oświetlenie
            scene.add(new THREE.AmbientLight(0xffffff, 0.01));
            const flashlight = new THREE.SpotLight(0xffffff, 1.5);
            flashlight.distance = 6;
            flashlight.angle = Math.PI / 7;
            flashlight.decay = 2;
            camera.add(flashlight);
            flashlight.target = camera;
            scene.add(camera);

            // Mapa
            const loader = new GLTFLoader();
            loader.load('map.glb', (gltf) => {
                mapModel = gltf.scene;
                
                // Centrujemy mapę i upewniamy się, że podłoga jest na Y = 0
                const box = new THREE.Box3().setFromObject(mapModel);
                const center = box.getCenter(new THREE.Vector3());
                mapModel.position.x = -center.x;
                mapModel.position.z = -center.z;
                mapModel.position.y = -box.min.y; // To stawia podłogę modelu na Y=0
                
                scene.add(mapModel);
            });

            // Przeciwnik
            const texLoader = new THREE.TextureLoader();
            texLoader.load('photo1.png', (texture) => {
                const material = new THREE.MeshBasicMaterial({ map: texture, transparent: true });
                enemy = new THREE.Mesh(new THREE.PlaneGeometry(0.3, 0.3), material);
                enemy.position.set(0, 0.15, 0); // Startuje w centrum
                scene.add(enemy);
            });

            clock = new THREE.Clock();
            const onKey = (e, state) => {
                if (e.code === 'KeyW') moveForward = state;
                if (e.code === 'KeyS') moveBackward = state;
                if (e.code === 'KeyA') moveLeft = state;
                if (e.code === 'KeyD') moveRight = state;
            };
            window.addEventListener('keydown', (e) => onKey(e, true));
            window.addEventListener('keyup', (e) => onKey(e, false));
            
            animate();
        }

        function checkCollision() {
            if (!mapModel) return false;
            const moveDir = new THREE.Vector3();
            camera.getWorldDirection(moveDir);
            moveDir.y = 0;
            moveDir.normalize();
            raycaster.set(camera.position, moveDir);
            const intersects = raycaster.intersectObject(mapModel, true);
            return (intersects.length > 0 && intersects[0].distance < COLLISION_DIST);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked) {
                const delta = clock.getDelta();
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (moveForward && checkCollision()) {
                    velocity.z = 0;
                } else {
                    if (moveForward || moveBackward) velocity.z -= direction.z * WALK_SPEED * delta;
                    if (moveLeft || moveRight) velocity.x -= direction.x * WALK_SPEED * delta;
                }

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);
                
                // WYMUSZENIE BYCIA NAD MAPĄ
                camera.position.y = PLAYER_HEIGHT;

                if (enemy) {
                    enemy.lookAt(camera.position);
                    const enemyDir = new THREE.Vector3().subVectors(camera.position, enemy.position).normalize();
                    enemyDir.y = 0;
                    enemy.position.add(enemyDir.multiplyScalar(ENEMY_SPEED * delta));

                    const dist = camera.position.distanceTo(enemy.position);
                    document.getElementById('dist').innerText = dist.toFixed(1);
                    document.getElementById('pos-info').innerText = camera.position.x.toFixed(1);

                    if (dist < 0.15) {
                        controls.unlock();
                        alert("KONIEC");
                        location.reload();
                    }
                }
            }
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
