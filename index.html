<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>3D Horror - map.glb</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px;
            border: 1px solid rgba(255,255,255,0.5); border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none;
        }
        #ui {
            position: absolute; bottom: 20px; left: 20px; color: #f00;
            font-family: 'Courier New', monospace; font-size: 18px;
        }
        #overlay {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; color: white; z-index: 20; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="crosshair"></div>
    <div id="ui">SYSTEM STATUS: <span id="dist">0</span>m TO TARGET</div>
    
    <div id="overlay">
        <h1>MAPA ZAŁADOWANA: map.glb</h1>
        <p>KLIKNIJ, ABY WEJŚĆ DO GRY</p>
        <p>(WSAD - Ruch | MYSZ - Rozglądanie się)</p>
    </div>

    <video id="music" loop><source src="video1.mp4" type="video/mp4"></video>

    <script type="module">
        import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js';
        import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
        import { PointerLockControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/PointerLockControls.js';

        let scene, camera, renderer, controls, enemy, clock;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        const overlay = document.getElementById('overlay');
        const music = document.getElementById('music');

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020202);
            scene.fog = new THREE.Fog(0x020202, 2, 20);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Sterowanie myszką (FPS)
            controls = new PointerLockControls(camera, document.body);
            
            overlay.addEventListener('click', () => {
                controls.lock();
            });

            controls.addEventListener('lock', () => {
                overlay.style.display = 'none';
                music.play();
            });

            controls.addEventListener('unlock', () => {
                overlay.style.display = 'flex';
                music.pause();
            });

            // Światło (Latarka gracza)
            const flashlight = new THREE.SpotLight(0xffffff, 50, 20, Math.PI/6, 0.5);
            camera.add(flashlight);
            flashlight.target = camera; // Świeci tam gdzie patrzymy
            scene.add(camera);

            const ambient = new THREE.AmbientLight(0x404040, 0.2);
            scene.add(ambient);

            // Ładowanie mapy GLB
            const loader = new GLTFLoader();
            loader.load('map.glb', (gltf) => {
                scene.add(gltf.scene);
                console.log("Mapa załadowana!");
            }, undefined, (error) => {
                console.error("Błąd ładowania mapy:", error);
            });

            // Przeciwnik (photo1.png)
            const texture = new THREE.TextureLoader().load('photo1.png');
            const enemyMat = new THREE.MeshBasicMaterial({ map: texture, transparent: true });
            enemy = new THREE.Mesh(new THREE.PlaneGeometry(2.5, 2.5), enemyMat);
            enemy.position.set(0, 1.25, -15);
            scene.add(enemy);

            clock = new THREE.Clock();
            window.addEventListener('keydown', onKeyDown);
            window.addEventListener('keyup', onKeyUp);
            
            animate();
        }

        function onKeyDown(e) {
            switch(e.code) {
                case 'KeyW': moveForward = true; break;
                case 'KeyS': moveBackward = true; break;
                case 'KeyA': moveLeft = true; break;
                case 'KeyD': moveRight = true; break;
            }
        }

        function onKeyUp(e) {
            switch(e.code) {
                case 'KeyW': moveForward = false; break;
                case 'KeyS': moveBackward = false; break;
                case 'KeyA': moveLeft = false; break;
                case 'KeyD': moveRight = false; break;
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked) {
                const delta = clock.getDelta();

                // Fizyka ruchu FPS
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (moveForward || moveBackward) velocity.z -= direction.z * 100.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 100.0 * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);

                // AI Przeciwnika
                enemy.lookAt(camera.position);
                const enemyDir = new THREE.Vector3().subVectors(camera.position, enemy.position).normalize();
                enemy.position.add(enemyDir.multiplyScalar(3.5 * delta));

                // Dystans
                const dist = camera.position.distanceTo(enemy.position);
                document.getElementById('dist').innerText = Math.floor(dist);

                if (dist < 1.5) {
                    controls.unlock();
                    alert("ZŁAPANY PRZEZ PHOTO1.PNG");
                    location.reload();
                }
            }

            renderer.render(scene, camera);
        }

        init();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
