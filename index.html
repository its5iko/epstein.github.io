<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>3D Survival - Ultimate Position Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 4px; height: 4px;
            background: #0f0; border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 100;
        }
        #ui {
            position: absolute; bottom: 20px; left: 20px; color: #0f0; font-size: 12px;
            background: rgba(0,0,0,0.5); padding: 10px;
        }
        #overlay {
            position: absolute; width: 100%; height: 100%; background: #000;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; color: #0f0; z-index: 200; cursor: pointer;
        }
        #music-video { display: none !important; }
    </style>
</head>
<body>

    <div id="crosshair"></div>
    <div id="ui">
        COORD: <span id="pos">0, 0, 0</span><br>
        MAP STATUS: <span id="status">LOADING...</span>
    </div>
    
    <div id="overlay">
        <h1>AWARYJNE POZYCJONOWANIE</h1>
        <p>[ KLIKNIJ, ABY WYMUSIĆ START ]</p>
    </div>

    <video id="music-video" loop><source src="video1.mp4" type="video/mp4"></video>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        let scene, camera, renderer, controls, enemy, clock, mapModel;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        // --- USTAWIENIA ---
        let PLAYER_HEIGHT = 1.0; // Zwiększone dla bezpieczeństwa
        const WALK_SPEED = 10.0;
        const ENEMY_SPEED = 0.3;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);
            scene.fog = new THREE.Fog(0x000000, 0.1, 15);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 1000);
            // Startujemy bardzo wysoko, żeby widzieć mapę z góry
            camera.position.set(0, 10, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            controls = new PointerLockControls(camera, document.body);
            document.getElementById('overlay').addEventListener('click', () => controls.lock());

            controls.addEventListener('lock', () => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('music-video').play();
            });

            // Oświetlenie (Tymczasowo mocne, żebyś widział gdzie jesteś)
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const flashlight = new THREE.PointLight(0xffffff, 5, 20);
            camera.add(flashlight);
            scene.add(camera);

            // Pomocnicze osie (Czerwona = X, Zielona = Y, Niebieska = Z)
            const axesHelper = new THREE.AxesHelper(5);
            scene.add(axesHelper);

            // Ładowanie Mapy
            const loader = new GLTFLoader();
            loader.load('map.glb', (gltf) => {
                mapModel = gltf.scene;
                
                // Obliczamy wymiary mapy
                const box = new THREE.Box3().setFromObject(mapModel);
                const size = box.getSize(new THREE.Vector3());
                
                // Ustawiamy środek mapy na 0,0,0
                mapModel.position.y = -box.min.y; 
                
                scene.add(mapModel);
                document.getElementById('status').innerText = "READY";
                
                // TELEPORTACJA GRACZA NAD MAPĘ
                camera.position.set(0, PLAYER_HEIGHT, 5);
                console.log("Mapa załadowana. Rozmiar:", size);
            }, undefined, (error) => {
                document.getElementById('status').innerText = "ERROR LOADING MAP";
                console.error(error);
            });

            // Przeciwnik
            const texLoader = new THREE.TextureLoader();
            texLoader.load('photo1.png', (texture) => {
                const material = new THREE.MeshBasicMaterial({ map: texture, transparent: true, side: THREE.DoubleSide });
                enemy = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), material);
                enemy.position.set(0, 0.5, -5);
                scene.add(enemy);
            });

            clock = new THREE.Clock();
            const onKey = (e, state) => {
                if (e.code === 'KeyW') moveForward = state;
                if (e.code === 'KeyS') moveBackward = state;
                if (e.code === 'KeyA') moveLeft = state;
                if (e.code === 'KeyD') moveRight = state;
            };
            window.addEventListener('keydown', (e) => onKey(e, true));
            window.addEventListener('keyup', (e) => onKey(e, false));
            
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked) {
                const delta = clock.getDelta();
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (moveForward || moveBackward) velocity.z -= direction.z * WALK_SPEED * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * WALK_SPEED * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);
                
                // WYMUSZENIE WYSOKOŚCI
                camera.position.y = PLAYER_HEIGHT;

                if (enemy) {
                    enemy.lookAt(camera.position);
                    const enemyDir = new THREE.Vector3().subVectors(camera.position, enemy.position).normalize();
                    enemyDir.y = 0;
                    enemy.position.add(enemyDir.multiplyScalar(ENEMY_SPEED * delta));

                    const dist = camera.position.distanceTo(enemy.position);
                    document.getElementById('pos').innerText = 
                        `${camera.position.x.toFixed(1)}, ${camera.position.y.toFixed(1)}, ${camera.position.z.toFixed(1)}`;
                }
            }
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
