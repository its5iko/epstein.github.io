<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>3D Survival - Podłoga Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 4px; height: 4px;
            background: red; border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 100;
        }
        #ui {
            position: absolute; bottom: 20px; left: 20px; color: #500; font-size: 12px;
        }
        #overlay {
            position: absolute; width: 100%; height: 100%; background: #000;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; color: #f00; z-index: 200; cursor: pointer;
        }
        #music-video { display: none !important; }
    </style>
</head>
<body>

    <div id="crosshair"></div>
    <div id="ui">X: <span id="posX">0</span> | Y: <span id="posY">0</span> | DIST: <span id="dist">0</span>m</div>
    
    <div id="overlay">
        <h1>KALIBRACJA POZYCJI...</h1>
        <p>[ KLIKNIJ, ABY ROZPOCZĄĆ ]</p>
    </div>

    <video id="music-video" loop><source src="video1.mp4" type="video/mp4"></video>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        let scene, camera, renderer, controls, enemy, clock, mapModel;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        const raycaster = new THREE.Raycaster();

        // --- PARAMETRY (Zmienione, byś nie był pod mapą) ---
        const WALK_SPEED = 8.0;     
        const ENEMY_SPEED = 0.2;    
        const PLAYER_HEIGHT = 0.5; // Wyżej, by nie zapadać się w podłogę
        const COLLISION_DIST = 0.3;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);
            scene.fog = new THREE.Fog(0x000000, 0.1, 10);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 500);
            
            // STARTUJEMY WYSOKO I DALEKO, by widzieć mapę z góry na starcie
            camera.position.set(0, 2, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            controls = new PointerLockControls(camera, document.body);
            document.getElementById('overlay').addEventListener('click', () => controls.lock());

            controls.addEventListener('lock', () => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('music-video').play();
            });

            // Oświetlenie (Nieco mocniejsze na start)
            scene.add(new THREE.AmbientLight(0xffffff, 0.05));
            const flashlight = new THREE.SpotLight(0xffffff, 2);
            flashlight.distance = 10;
            flashlight.angle = Math.PI / 6;
            camera.add(flashlight);
            flashlight.target = camera;
            scene.add(camera);

            // Ładowanie Mapy
            const loader = new GLTFLoader();
            loader.load('map.glb', (gltf) => {
                mapModel = gltf.scene;
                
                // Automatyczne ustawienie pod nogami
                const box = new THREE.Box3().setFromObject(mapModel);
                mapModel.position.y = -box.min.y; // Ustawia najniższy punkt mapy na Y=0
                
                scene.add(mapModel);
                console.log("Mapa załadowana. Min Y modelu to: " + box.min.y);
            });

            // Przeciwnik
            const texLoader = new THREE.TextureLoader();
            texLoader.load('photo1.png', (texture) => {
                const material = new THREE.MeshBasicMaterial({ map: texture, transparent: true, side: THREE.DoubleSide });
                enemy = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 0.5), material);
                enemy.position.set(2, 0.3, -2);
                scene.add(enemy);
            });

            clock = new THREE.Clock();
            const onKey = (e, state) => {
                if (e.code === 'KeyW') moveForward = state;
                if (e.code === 'KeyS') moveBackward = state;
                if (e.code === 'KeyA') moveLeft = state;
                if (e.code === 'KeyD') moveRight = state;
            };
            window.addEventListener('keydown', (e) => onKey(e, true));
            window.addEventListener('keyup', (e) => onKey(e, false));
            
            animate();
        }

        function checkCollision() {
            if (!mapModel) return false;
            const moveDir = new THREE.Vector3();
            camera.getWorldDirection(moveDir);
            moveDir.y = 0;
            moveDir.normalize();
            raycaster.set(camera.position, moveDir);
            const intersects = raycaster.intersectObject(mapModel, true);
            return (intersects.length > 0 && intersects[0].distance < COLLISION_DIST);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked) {
                const delta = clock.getDelta();
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (moveForward && checkCollision()) {
                    velocity.z = 0;
                } else {
                    if (moveForward || moveBackward) velocity.z -= direction.z * WALK_SPEED * delta;
                    if (moveLeft || moveRight) velocity.x -= direction.x * WALK_SPEED * delta;
                }

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);
                
                // UTRZYMANIE WYSOKOŚCI
                camera.position.y = PLAYER_HEIGHT;

                if (enemy) {
                    enemy.lookAt(camera.position);
                    const enemyDir = new THREE.Vector3().subVectors(camera.position, enemy.position).normalize();
                    enemyDir.y = 0;
                    enemy.position.add(enemyDir.multiplyScalar(ENEMY_SPEED * delta));

                    const dist = camera.position.distanceTo(enemy.position);
                    document.getElementById('dist').innerText = dist.toFixed(1);
                    document.getElementById('posX').innerText = camera.position.x.toFixed(1);
                    document.getElementById('posY').innerText = camera.position.z.toFixed(1);

                    if (dist < 0.2) {
                        controls.unlock();
                        alert("PRZEGRANA");
                        location.reload();
                    }
                }
            }
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
